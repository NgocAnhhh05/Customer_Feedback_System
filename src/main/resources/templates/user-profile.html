<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Hệ Thống Phản Hồi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #93a5ff;
            --primary-blue-hover: #7b91ff;
            --light-blue-bg: #e6edff;
            --dark-text: #333333;
            --gray-text: #888888;
            --border-color: #e0e0e0;
            --bg-color: #f9f9f9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* ----- HEADER ----- */
        .header-container {
            background-color: white;
            padding: 0.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-spacer { width: 120px; }

        .nav-pills .nav-link {
            color: var(--dark-text);
            font-weight: 500;
            border-radius: 0.25rem;
            padding: 0.5rem 1rem;
            margin: 0 0.5rem;
        }

        .nav-pills .nav-link:hover { background-color: #f0f0f0; }

        .user-profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--dark-text);
            font-weight: 500;
            text-decoration: none;
            padding: 0.3rem 0.5rem;
            border-radius: 0.4rem;
            transition: background-color 0.2s;
        }

        .user-profile-btn:hover {
            background-color: var(--light-blue-bg);
            color: var(--dark-text);
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .avt-blue { background-color: #5dade2; }

        /* ----- MAIN CONTENT ----- */
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            margin-top: 2rem;
            color: var(--dark-text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Profile Card */
        .profile-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 0.8rem;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #5dade2; /* Giữ màu xanh của User */
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .profile-email {
            color: var(--gray-text);
            margin-bottom: 0.8rem;
        }

        .post-count-badge {
            display: inline-block;
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.8rem;
            border-radius: 0.4rem;
            font-size: 0.85rem;
            color: var(--gray-text);
        }

        /* Action Buttons trong Profile */
        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 200px;
        }

        .btn-profile {
            padding: 0.6rem 1rem;
            border-radius: 0.4rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-edit-profile {
            background-color: var(--primary-blue);
            color: white;
            border: none;
        }
        .btn-edit-profile:hover { background-color: var(--primary-blue-hover); color: white; }

        .btn-outline-custom {
            background-color: white;
            border: 1px solid var(--border-color);
            color: var(--primary-blue);
        }
        .btn-outline-custom:hover { background-color: var(--light-blue-bg); }

        /* ----- FEEDBACK CARD LIST ----- */
        .feedback-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            overflow: hidden;
        }

        .card-main-content {
            flex: 1;
            padding: 1.5rem;
        }

        .card-vote-score {
            width: 80px;
            border-left: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #555;
            background-color: #fafafa;
        }

        .title-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-text);
        }

        .desc-text {
            color: var(--gray-text);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-action-small {
            border: 1px solid var(--border-color);
            background-color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            color: var(--gray-text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-action-small:hover { background-color: var(--bg-color); }

        .btn-action-blue { color: var(--primary-blue); border-color: var(--light-blue-bg); }
        .btn-action-blue:hover { background-color: var(--light-blue-bg); }

        .btn-action-red { color: #e74c3c; border-color: #fadbd8; }
        .btn-action-red:hover { background-color: #fadbd8; }

        .btn-vote-filled {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 0.3rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
        }

        .status-badge {
            border: 1px solid var(--border-color);
            color: var(--gray-text);
            padding: 0.3rem 0.8rem;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

    </style>
</head>
<body>

<!-- HEADER -->
<header class="header-container">
    <div class="header-spacer"></div>

    <ul class="nav nav-pills align-items-center">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/bang-phan-hoi}">Bảng phản hồi</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/quan-ly-roadmap}">Lộ trình sản phẩm</a>
        </li>
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Tài nguyên <i class="bi bi-chevron-down ms-1" style="font-size: 0.8rem;"></i>
            </a>
            <ul class="dropdown-menu shadow-sm" aria-labelledby="taiNguyenDropdown">
                <li><a class="dropdown-item" href="#">Tài liệu hướng dẫn</a></li>
                <li><a class="dropdown-item" href="#">Chính sách & Quy định</a></li>
            </ul>
        </li>
    </ul>

    <a th:href="@{/user-profile}" class="user-profile-btn">
        <div class="avatar-circle avt-blue" id="headerAvatar"   >VT</div>
        <span id="headerUsername">Người dùng</span>
    </a>
</header>

<!-- NỘI DUNG CHÍNH -->
<div class="container-fluid px-4 px-lg-5 max-w-1200" style="max-width: 1000px; margin: 0 auto;">

    <h3 class="section-title">Tài khoản của tôi</h3>

    <div id="myFeedbackContainer">
        <div class="text-center text-muted p-4">Đang tải lịch sử phản hồi...</div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT GỌI API XÓA KÈM CUSTOM HEADER -->
<script>
    document.querySelectorAll('.btn-delete-feedback').forEach(button => {
        button.addEventListener('click', function(event) {
            event.preventDefault(); // Chặn reload trang

            // Hiển thị hộp thoại xác nhận trước khi xóa
            window.deleteFeedback = function(feedbackId) {
            if(confirm("Bạn có chắc chắn muốn xóa phản hồi này không? Hành động này không thể hoàn tác.")) {

                // Gọi API xóa feedback
                fetch('/api/feedbacks/1', { // Giả sử phản hồi này có ID = 1
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Customer-Id': 'CUST_001' // Gắn Header định danh người dùng
                    }
                })
                    .then(response => {
                        if(response.ok) {
                            alert("Đã xóa phản hồi thành công!");
                            // Xóa luôn cái khung HTML (card) chứa bài viết này ra khỏi màn hình
                            this.closest('.feedback-card').remove();
                        } else {
                            alert("Có lỗi xảy ra, không thể xóa!");
                        }
                    })
                    .catch(error => {
                        console.error('Lỗi kết nối API:', error);
                        alert("Không thể kết nối tới Server Backend.");
                    });
                }
            }
        }); 
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. ĐỒNG BỘ THÔNG TIN USER ĐĂNG NHẬP
        const userRole = localStorage.getItem("userRole") || "CUSTOMER"; 
        const currentUsername = localStorage.getItem("username") || "Người dùng";
        const customerId = localStorage.getItem("customerId") || "CUST_001";
        const token = localStorage.getItem("accessToken");

        // Đồng bộ hiển thị tên lên giao diện
        const shortName = currentUsername.substring(0, 2).toUpperCase();
        // Nhắm trúng mã ID ở header vừa sửa và khối thông tin cá nhân chính
        if (document.getElementById("headerUsername")) {
            document.getElementById("headerUsername").innerText = currentUsername;
        }
        if (document.getElementById("profileName")) {
            document.getElementById("profileName").innerText = currentUsername;
        }
        
        // Cập nhật chữ cái viết tắt của Avatar (ví dụ: RO cho root_manager)
        if (document.getElementById("headerAvatar")) {
            document.getElementById("headerAvatar").innerText = shortName;
        }
        if (document.getElementById("mainAvatar")) {
            document.getElementById("mainAvatar").innerText = shortName;
        }

        // Tự động sinh Email hiển thị theo tên tài khoản nếu DB không trả về
        if (document.getElementById("profileEmail")) {
            const emailPrefix = currentUsername.toLowerCase().replace(/\s+/g, '');
            document.getElementById("profileEmail").innerText = `${emailPrefix}@email.com`;
        }
        const profileSpan = document.querySelector('.header-container span, .landing-header span');
        if (profileSpan) profileSpan.innerText = currentUsername;

        // Tự động dựng tab Admin nếu có quyền hạn cao
        if (userRole === "ADMIN" || userRole === "MANAGER") {
            const navUl = document.querySelector('.header-container ul.nav');
            if (navUl && !document.getElementById('adminTabItem')) {
                const li = document.createElement('li');
                li.className = 'nav-item';
                li.id = 'adminTabItem';
                li.innerHTML = '<a class="nav-link" href="/admin-tong-quan">Quản trị viên</a>';
                navUl.insertBefore(li, navUl.firstChild);
            }
        }
document.getElementById("btnLogout").addEventListener("click", () => localStorage.clear());
// Hàm chuyển đổi Enum Topic sang tiếng Việt trực quan
function translateTopic(topic) {
            const topicMap = {
                "PRODUCT_ISSUE": "Lỗi sản phẩm",
                "SERVICE_QUALITY": "Chất lượng dịch vụ",
                "DELIVERY_ISSUE": "Vấn đề vận chuyển",
                "SUGGESTION": "Gợi ý / Đề xuất",
                "COMPLAINT": "Khiếu nại",
                "OTHER": "Khác"
            };
            return topicMap[topic] || "Khác";
        }
        // 2. NẠP DỮ LIỆU ĐỘNG VÀ ĐÓNG DẤU ID BIẾN MẢNG ĐỌC TỪ API BACKEND
        const feedbackContainer = document.getElementById("myFeedbackContainer");
        
        fetch('/api/feedbacks/history', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token,
                'X-Customer-Id': customerId
            }
        })
        .then(response => response.json())
        .then(apiResponse => {
            // Kiểm tra trạng thái success của vỏ bọc ApiResponse và bóc tách mảng dữ liệu thật từ .data
            if (apiResponse.success && apiResponse.data && apiResponse.data.length > 0) {
                feedbackContainer.innerHTML = ""; // Xóa dòng chữ đang tải...
                const myFeedbacks = apiResponse.data;

                // 🌟 ĐOẠN ĐẶT VÒNG LẶP FOREACH GẮN ID ĐỘNG MÀ BẠN CẦN TÌM:
                myFeedbacks.forEach(fb => {
                    let statusText = "Đang xem xét";
                    let badgeIcon = "bi-search";
                    if (fb.status === "IN_PROGRESS") { statusText = "Đang thực hiện"; badgeIcon = "bi-arrow-clockwise"; }
                    if (fb.status === "RESOLVED") { statusText = "Đã hoàn thành"; badgeIcon = "bi-check-lg"; }

                    // Gắn thêm thuộc tính id="fb-card-${fb.feedbackId}" vào thẻ div bọc ngoài cùng của card
                    feedbackContainer.innerHTML += `
                        <div class="feedback-card" id="fb-card-${fb.feedbackId}">
                            <div class="card-main-content">
                                <h5 class="title-text">${fb.content ? fb.content.split(' - ')[0] : 'Phản hồi'}</h5>
                                <p class="desc-text">${fb.content || ''}</p>
                                <div class="d-flex justify-content-between align-items-center border-top pt-3 flex-wrap gap-2">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="avatar-circle avt-blue" style="width: 28px; height: 28px; font-size: 0.7rem;">${shortName}</div>
                                        <div>
                                            <span style="font-size: 0.85rem;" class="fw-bold">${currentUsername}</span>
                                            <span class="text-secondary ms-2" style="font-size: 0.75rem;">${new Date(fb.createdAt).toLocaleDateString('vi-VN')}</span>
                                        </div>
                                    </div>
                                    <div class="d-flex align-items-center gap-2">
                                        <button class="btn-action-small btn-action-red" onclick="deleteFeedback('${fb.feedbackId}')"><i class="bi bi-trash"></i> Xóa</button>
                                        <a href="/sua-feedback?id=${fb.feedbackId}" class="btn-action-small btn-action-blue"><i class="bi bi-pencil"></i> Chỉnh sửa</a>
                                        <span class="text-secondary mx-2"><i class="bi bi-chat-square-text"></i> ${fb.replies ? fb.replies.length : 0}</span>
                                        <div class="status-badge">
                                            <i class="bi ${badgeIcon} text-secondary"></i> ${statusText}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card-vote-score">${fb.rating ? fb.rating * 5 : 25}</div>
                        </div>
                    `;
                });
            } else {
                feedbackContainer.innerHTML = `<div class="text-center text-muted p-4">Bạn chưa gửi phản hồi nào lên hệ thống.</div>`;
            }
        })
        .catch(error => {
            console.error('Lỗi tải lịch sử:', error);
            feedbackContainer.innerHTML = `<div class="text-center text-danger p-4">Không thể kết nối đến máy chủ Backend.</div>`;
        });

        // 3. LOGIC HÀM XÓA ĐỘNG THEO ID DUY NHẤT (WINDOW SCOPE)
        window.deleteFeedback = function(feedbackId) {
            if (confirm("Bạn có chắc chắn muốn xóa phản hồi này không? Hành động này không thể hoàn tác.")) {
                fetch(`/api/feedbacks/${feedbackId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'X-Customer-Id': customerId
                    }
                })
                .then(response => response.json())
                .then(apiResponse => {
                    // Đọc thuộc tính .success từ lớp vỏ ApiResponse của Backend trả về
                    if (apiResponse.success) {
                        alert(apiResponse.message || "Đã xóa phản hồi thành công!");
                        
                        // Tìm chuẩn xác thẻ div có ID tương ứng để xóa ngay khỏi màn hình UI
                        const cardNode = document.getElementById(`fb-card-${feedbackId}`);
                        if (cardNode) cardNode.remove(); 
                    } else {
                        alert("Xóa thất bại: " + apiResponse.message);
                    }
                })
                .catch(error => console.error('Lỗi kết nối xóa:', error));
            }
        };
    });
</script>
</body>
</html>
