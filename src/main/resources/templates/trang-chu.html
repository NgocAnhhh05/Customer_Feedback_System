<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Hệ Thống Phản Hồi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-blue: #0d6efd; /* Màu xanh đậm nổi bật của trang chủ */
            --bg-light-blue: #ebf2ff; /* Màu nền form đăng nhập */
            --dark-text: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- HEADER ----- */
        .landing-header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: center; /* Đưa menu ra giữa */
            align-items: center;
            position: relative;
        }

        .center-menu {
            display: flex;
            gap: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .center-menu a {
            color: var(--dark-text);
            text-decoration: none;
        }

        .center-menu a:hover {
            color: var(--brand-blue);
        }

        .right-menu {
            position: absolute;
            right: 3rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-brand-primary {
            background-color: var(--brand-blue);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 0.4rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
        }

        .btn-brand-primary:hover {
            background-color: #0b5ed7;
            color: white;
        }

        .login-text-link {
            color: var(--dark-text);
            text-decoration: none;
            font-weight: 500;
        }

        /* ----- MAIN CONTENT ----- */
        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
            max-width: 400px;
            line-height: 1.6;
        }

        /* ----- LOGIN BOX ----- */
        .login-box {
            background-color: var(--bg-light-blue);
            border-radius: 1rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            margin-left: auto;
        }

        .login-input {
            border: none;
            border-radius: 0.3rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .login-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            outline: none;
        }

    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="landing-header">
        <div class="center-menu">
            <a href="#">Bảng phản hồi</a>
            <a href="#">Lộ trình sản phẩm</a>
            <a href="#">Tài nguyên <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-chevron-down" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/></svg></a>
        </div>
        <div class="right-menu">
            <a href="#" class="login-text-link">Đăng Nhập</a>
            <!-- LINK TỚI TRANG ĐĂNG KÝ -->
            <a href="dang-ky.html" class="btn-brand-primary">Đăng Ký</a>
        </div>
    </header>

    <!-- NỘI DUNG -->
    <div class="container hero-section">
        <div class="row w-100 align-items-center">
            
            <!-- Cột trái: Chữ và nút Bắt đầu -->
            <div class="col-lg-6 mb-5 mb-lg-0">
                <h1 class="hero-title">Lắng nghe khách hàng, cải thiện sản phẩm</h1>
                <p class="hero-subtitle">Thu thập những phản hồi quan trọng. Xây dựng những gì người dùng thực sự mong muốn.</p>
                <!-- LINK TỚI TRANG ĐĂNG KÝ -->
                <a href="dang-ky.html" class="btn-brand-primary" style="padding: 0.8rem 2rem; font-size: 1.1rem;">Bắt đầu</a>
            </div>

            <!-- Cột phải: Khung đăng nhập -->
            <div class="col-lg-6">
                <div class="login-box">
                    <form action="bang-phan-hoi.html">
                        <input type="text" class="form-control login-input" placeholder="Tài khoản" required>
                        <input type="password" class="form-control login-input" placeholder="Mật khẩu" required>
                        
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <a href="#" class="text-secondary text-decoration-none" style="font-size: 0.9rem;">Quên mật khẩu?</a>
                            <!-- NÚT NÀY SẼ CHUYỂN VÀO HỆ THỐNG -->
                            <button type="submit" class="btn-brand-primary">Đăng Nhập</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
