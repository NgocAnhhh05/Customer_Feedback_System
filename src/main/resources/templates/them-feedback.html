<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Phản Hồi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary-blue: #93a5ff; --primary-blue-hover: #7b91ff; --light-blue-bg: #e6edff; --dark-text: #333333; --border-color: #e0e0e0; --bg-color: #f9f9f9;}
        body { background-color: var(--bg-color); color: var(--dark-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;}
        .header-container { background-color: white; padding: 0.5rem 2rem; display: flex; align-items: center; justify-content: space-between;}
        .nav-pills .nav-link { color: var(--dark-text); font-weight: 500; border-radius: 0.25rem; padding: 0.5rem 1rem; margin: 0 0.5rem;}
        .nav-pills .nav-link.active { background-color: var(--light-blue-bg); color: #333;}
        .avatar-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.85rem; background-color: #5dade2;}
        .form-card { background-color: white; border: 1px solid var(--border-color); border-radius: 0.8rem; padding: 2.5rem; max-width: 800px; margin: 2rem auto; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .form-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; color: var(--dark-text);}
        .custom-input { border: 1px solid var(--primary-blue); border-radius: 0.5rem; padding: 0.8rem 1rem; background-color: #fbfcff;}
        .custom-textarea { border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 0.8rem 1rem; resize: vertical; min-height: 200px;}
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;}
        .btn-cancel { border: 1px solid var(--border-color); color: var(--primary-blue); background-color: white; padding: 0.6rem 1.5rem; border-radius: 0.4rem; font-weight: 500; text-decoration: none;}
        .btn-submit { background-color: var(--primary-blue); color: white; padding: 0.6rem 2rem; border-radius: 0.4rem; font-weight: 500; border: none;}
    </style>
</head>
<body>

<header class="header-container">
    <div style="width: 120px;"></div>
    <ul class="nav nav-pills align-items-center">
        <li class="nav-item"><a class="nav-link active" th:href="@{/bang-phan-hoi}">Bảng phản hồi</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/quan-ly-roadmap}">Lộ trình sản phẩm</a></li>
    </ul>
    <div class="d-flex align-items-center gap-2">
        <div class="avatar-circle">VT</div>
        <span class="fw-medium">Vũ Tiến</span>
    </div>
</header>

<div class="container-fluid px-4 px-lg-5">
    <div class="form-card">
        <h2 class="form-title">Thêm phản hồi</h2>

        <form id="feedbackForm">
            <div class="mb-4">
                <input type="text" id="fbTitle" class="form-control custom-input" placeholder="Tiêu đề phản hồi" required>
            </div>

            <div class="mb-4">
                <textarea id="fbContent" class="form-control custom-textarea" placeholder="Chi tiết phản hồi" required></textarea>
            </div>

            <div class="form-actions">
                <input type="file" id="fbImageInput" accept="image/*" style="display: none;">
                <button type="button" id="btnUploadTrigger" class="btn btn-outline-primary border"><i class="bi bi-plus-lg"></i> Tải ảnh lên</button>

                <div class="d-flex gap-2">
                    <a th:href="@{/bang-phan-hoi}" class="btn-cancel">Hủy</a>
                    <button type="submit" class="btn-submit">Gửi yêu cầu</button>
                </div>
            </div>
            <div id="imagePreviewContainer" class="mt-3" style="display: none;">
                <img id="imagePreview" src="" alt="Xem trước ảnh" style="width: 150px; height: 100px; object-fit: cover; border-radius: 0.4rem; border: 1px solid #e0e0e0;">
                <button type="button" id="btnRemovePreview" class="btn btn-danger btn-sm ms-2">Xóa ảnh</button>
            </div>
        </form>
    </div>
</div>

<script>
        const imageInput = document.getElementById('fbImageInput');
        const uploadTrigger = document.getElementById('btnUploadTrigger');
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previewImage = document.getElementById('imagePreview');
        const removePreview = document.getElementById('btnRemovePreview');

        // 1. Kích hoạt ô chọn file ẩn khi bấm nút "Tải ảnh lên"
        if (uploadTrigger) {
            uploadTrigger.addEventListener('click', () => imageInput.click());
        }

        // 2. Xử lý hiển thị ảnh xem trước (Preview)
        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewContainer.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. Xử lý nút xóa ảnh xem trước
        removePreview.addEventListener('click', () => {
            imageInput.value = ""; 
            previewContainer.style.display = 'none'; 
        });

        // 4. Xử lý gửi dữ liệu Form Multipart lên API Backend
        document.getElementById('feedbackForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const titleData = document.getElementById('fbTitle').value.trim();
            const contentData = document.getElementById('fbContent').value.trim();

            // Gộp tiêu đề và nội dung chi tiết thành chuỗi content dài để thỏa mãn @Size(min = 10) của Backend
            const fullContent = titleData + " - " + contentData;

            if (fullContent.length < 10) {
                alert("Nội dung phản hồi quá ngắn! Vui lòng nhập chi tiết thêm (tối thiểu 10 ký tự).");
                return;
            }

            // Khởi tạo FormData đóng gói dữ liệu đa phương tiện (Multipart Form-Data)
            const formData = new FormData();

            // Đóng gói Object JSON khớp hoàn toàn với cấu trúc Record FeedbackCreateRequest
            const feedbackDto = {
                content: fullContent,
                topic: "OTHER", // Giá trị mặc định thuộc Enum FeedbackTopic (BUG, FEATURE, PERFORMANCE, OTHER)
                rating: 5       // Mặc định chấm 5 sao khi gửi
            };

            // Ép định dạng Blob Application/Json cho phần dữ liệu metadata
            formData.append("feedback", new Blob([JSON.stringify(feedbackDto)], { type: "application/json" }));

            // Đính kèm file ảnh thật nếu người dùng có chọn tệp tin
            if (imageInput.files.length > 0) {
                formData.append("files", imageInput.files[0]);
            }

            // Lấy token và mã ID đã lưu từ bộ nhớ trình duyệt ra để điền vào Header
            const token = localStorage.getItem("accessToken");
            const customerId = localStorage.getItem("customerId") || "CUST_001";

            // Tiến hành gọi API thật (Không điền Content-Type để trình duyệt tự sinh Multipart Boundary)
            fetch('/api/feedbacks', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'X-Customer-Id': customerId
                },
                body: formData
            })
            .then(async response => {
                const result = await response.json();
                
                if (!response.ok) {
                    // Nếu gặp lỗi Validation (Mã 400), bóc tách Map<String, String> lỗi chi tiết từ ApiErrorResponse
                    if (result.errors) {
                        const errorMessages = Object.values(result.errors).join("\n");
                        throw new Error(errorMessages);
                    }
                    throw new Error(result.message || "Gửi phản hồi thất bại.");
                }
                return result; // Trả về ApiResponse<FeedbackResponse>
            })
            .then(apiResponse => {
                // Đi qua lớp vỏ thành công .data của ApiResponse để check dữ liệu trả về
                if (apiResponse.success) {
                    alert(apiResponse.message || "Đã gửi phản hồi lên hệ thống thành công!");
                    window.location.href = "/bang-phan-hoi"; // Chuyển về trang lịch sử công cộng
                } else {
                    alert("Thất bại: " + apiResponse.message);
                }
            })
            .catch(error => {
                console.error('Lỗi gửi feedback:', error);
                alert(error.message || "Không thể kết nối đến máy chủ Spring Boot.");
            });
        });
    </script>

</body>
</html>
